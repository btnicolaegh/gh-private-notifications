name: Release Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install web-ext
        run: npm install --global web-ext

      - name: Bump patch version
        id: version
        run: |
          NEW_VERSION=$(node -e "
            const v = require('./manifest.json').version.split('.');
            if (v.length !== 3 || v.some(isNaN)) { process.stderr.write('Unexpected version format\n'); process.exit(1); }
            v[2] = parseInt(v[2], 10) + 1;
            console.log(v.join('.'));
          ")
          node -e "
            const fs = require('fs');
            const v = '${NEW_VERSION}';
            for (const f of ['manifest.json', 'manifest.chrome.json']) {
              const m = JSON.parse(fs.readFileSync(f, 'utf8'));
              m.version = v;
              fs.writeFileSync(f, JSON.stringify(m, null, 2) + '\n');
            }
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json manifest.chrome.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Lint (Firefox)
        run: web-ext lint

      - name: Build (Firefox)
        run: web-ext build --overwrite-dest --filename "gh_private_notifications-firefox-{version}.zip"

      - name: Record Firefox zip path
        id: ff_zip
        run: echo "path=$(ls web-ext-artifacts/*firefox*.zip)" >> "$GITHUB_OUTPUT"

      - name: Build (Chrome)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p chrome-staging
          cp background.js compat.js \
             popup.html popup.js popup.css \
             options.html options.js options.css \
             summary.html summary.js summary.css \
             chrome-staging/
          cp -r icons chrome-staging/
          cp manifest.chrome.json chrome-staging/manifest.json
          (cd chrome-staging && zip -r "../web-ext-artifacts/gh_private_notifications-chrome-${VERSION}.zip" .)

      - name: Write release notes
        id: notes
        run: |
          FF_ZIP="${{ steps.ff_zip.outputs.path }}"
          CR_ZIP=$(ls web-ext-artifacts/*chrome*.zip)
          FF_SIZE=$(du -sh "$FF_ZIP" | cut -f1)
          CR_SIZE=$(du -sh "$CR_ZIP" | cut -f1)
          cat > /tmp/release-notes.md <<EOF
          ## GitHub Private Notifications v${{ steps.version.outputs.version }}

          Browser extension that monitors a GitHub Enterprise inbox and @mentions
          and fires native desktop notifications — even when email is disabled by admins.

          Supports **Firefox** (Manifest V2) and **Chrome** (Manifest V3).

          ### Firefox installation
          1. Download the \`gh_private_notifications-*.zip\` asset below.
          2. Open Firefox and go to \`about:debugging#/runtime/this-firefox\`.
          3. Click **Load Temporary Add-on…** and select the downloaded \`.zip\`.
          4. Open the extension options and enter your GHE base URL and a Personal Access Token.

          > For a permanent installation, sign it through [AMO](https://addons.mozilla.org/).

          ### Chrome installation
          1. Download the \`gh_private_notifications-chrome-*.zip\` asset below and unzip it.
          2. Open Chrome and go to \`chrome://extensions\`.
          3. Enable **Developer mode** (toggle in the top-right corner).
          4. Click **Load unpacked** and select the unzipped folder.
          5. Open the extension options and enter your GHE base URL and a Personal Access Token.

          ### Packaged files
          **Firefox** (${FF_SIZE}):
          \`\`\`
          $(unzip -l "$FF_ZIP" | tail -n +4 | head -n -2 | awk '{print $NF}')
          \`\`\`

          **Chrome** (${CR_SIZE}):
          \`\`\`
          $(unzip -l "$CR_ZIP" | tail -n +4 | head -n -2 | awk '{print $NF}')
          \`\`\`
          EOF

      - name: Create or update GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const tag = '${{ steps.version.outputs.tag }}';
            const version = '${{ steps.version.outputs.version }}';
            const body = fs.readFileSync('/tmp/release-notes.md', 'utf8');

            // Delete existing release/tag for this version if it exists (idempotent re-runs)
            try {
              const { data: rel } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: rel.id,
              });
            } catch (_) {}

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
            } catch (_) {}

            // Create fresh release
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `GitHub Private Notifications v${version}`,
              body,
              draft: false,
              prerelease: false,
            });

            // Upload all .zip assets (Firefox + Chrome)
            const zipDir = 'web-ext-artifacts';
            const files = fs.readdirSync(zipDir).filter(f => f.endsWith('.zip'));
            for (const file of files) {
              const data = fs.readFileSync(path.join(zipDir, file));
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: file,
                data,
                headers: { 'content-type': 'application/zip' },
              });
            }

            core.summary
              .addHeading(`Released ${tag}`)
              .addLink('View release', release.html_url)
              .write();
