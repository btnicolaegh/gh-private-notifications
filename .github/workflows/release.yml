name: Release Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install web-ext
        run: npm install --global web-ext

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./manifest.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: web-ext lint

      - name: Build
        run: web-ext build --overwrite-dest

      - name: Write release notes
        id: notes
        run: |
          ZIP=$(ls web-ext-artifacts/*.zip)
          SIZE=$(du -sh "$ZIP" | cut -f1)
          cat > /tmp/release-notes.md <<EOF
          ## GitHub Private Notifications v${{ steps.version.outputs.version }}

          Firefox extension that monitors a GitHub Enterprise inbox and @mentions
          and fires native desktop notifications — even when email is disabled by admins.

          ### Installation
          1. Download the \`.zip\` asset below.
          2. Open Firefox and go to \`about:debugging#/runtime/this-firefox\`.
          3. Click **Load Temporary Add-on…** and select the downloaded \`.zip\`.
          4. Open the extension options and enter your GHE base URL and a Personal Access Token.

          > For a permanent installation, load the extension via Firefox's Developer Edition or sign it through [AMO](https://addons.mozilla.org/).

          ### Packaged files (${SIZE})
          \`\`\`
          $(unzip -l "$ZIP" | tail -n +4 | head -n -2 | awk '{print $NF}')
          \`\`\`
          EOF

      - name: Create or update GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const tag = '${{ steps.version.outputs.tag }}';
            const version = '${{ steps.version.outputs.version }}';
            const body = fs.readFileSync('/tmp/release-notes.md', 'utf8');

            // Delete existing release/tag for this version if it exists (idempotent re-runs)
            try {
              const { data: rel } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: rel.id,
              });
            } catch (_) {}

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
            } catch (_) {}

            // Create fresh release
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `GitHub Private Notifications v${version}`,
              body,
              draft: false,
              prerelease: false,
            });

            // Upload the .zip asset
            const zipDir = 'web-ext-artifacts';
            const files = fs.readdirSync(zipDir).filter(f => f.endsWith('.zip'));
            for (const file of files) {
              const data = fs.readFileSync(path.join(zipDir, file));
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: file,
                data,
                headers: { 'content-type': 'application/zip' },
              });
            }

            core.summary
              .addHeading(`Released ${tag}`)
              .addLink('View release', release.html_url)
              .write();
